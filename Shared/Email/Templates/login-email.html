<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        .container { background: #fff; padding: 30px; border-radius: 8px; max-width: 500px; margin: auto; }
        .header { background: #4CAF50; color: white; padding: 15px; border-radius: 8px 8px 0 0; text-align: center; }
        .footer { font-size: 12px; color: #999; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h2>Login Notification</h2></div>
        <p>Hi <strong>{{name}}</strong>,</p>
        <p>A successful login was detected for your account.</p>
        <ul>
            <li><strong>Username:</strong> {{username}}</li>
            <li><strong>Email:</strong> {{email}}</li>
            <li><strong>Time:</strong> {{loginTime}}</li>
        </ul>
        <p>If this wasn't you, please contact support immediately.</p>
        <div class="footer">This is an automated message. Please do not reply.</div>
    </div>
</body>
</html>
